<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소프라노 리코더 운지법</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #c8d4dc;
      min-height: 100vh;
      font-family: 'Nanum Gothic', sans-serif;
      padding: 14px 10px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    h1 {
      font-family: 'Jua', sans-serif;
      font-size: 2.3rem;
      color: #1a2a3a;
      text-align: center;
    }

    /* ── 피아노 케이스 ── */
    .piano-case {
      background: linear-gradient(180deg, #8B2A2A 0%, #6B1A1A 40%, #7A2020 70%, #5C1515 100%);
      border-radius: 12px;
      padding: 8px 12px 10px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, .5), inset 0 2px 4px rgba(255, 180, 100, .15);
      border: 2px solid #A03030;
      width: 100%;
      max-width: 980px;
    }

    .piano-btn-bar {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px 8px;
      flex-wrap: wrap;
    }

    .btn-group {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .piano-btn {
      font-family: 'Jua', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 5px 12px;
      font-weight: bold;
      user-select: none;
      transition: filter .1s, transform .1s;
      box-shadow: 0 3px 6px rgba(0, 0, 0, .4);
    }

    .piano-btn:active {
      filter: brightness(0.85);
      transform: translateY(1px);
    }

    .btn-tone {
      background: #e8d5a3;
      color: #3a1a00;
    }

    .btn-tone.active {
      background: #ffe066;
      color: #3a1a00;
      box-shadow: 0 0 8px #ffe066;
    }

    .btn-size {
      background: #a3c4e8;
      color: #001a3a;
    }

    .btn-size.active {
      background: #66bbff;
      color: #001a3a;
      box-shadow: 0 0 8px #66bbff;
    }

    .vol-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .vol-label {
      font-family: 'Jua', sans-serif;
      font-size: 0.85rem;
      color: #e8d5a3;
      white-space: nowrap;
    }

    .vol-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 90px;
      height: 6px;
      border-radius: 3px;
      background: #5a2a2a;
      outline: none;
      cursor: pointer;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ffe066;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .5);
    }

    .vol-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ffe066;
      cursor: pointer;
      border: none;
    }

    .piano-key-area {
      background: #111;
      border-radius: 4px;
      padding: 0;
      box-shadow: inset 0 3px 8px rgba(0, 0, 0, .7);
      overflow-x: auto;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      scrollbar-width: auto;
      padding-bottom: 4px;
    }

    .piano-key-area::-webkit-scrollbar {
      height: 20px
    }

    .piano-key-area::-webkit-scrollbar-track {
      background: #222;
      border-radius: 4px
    }

    .piano-key-area::-webkit-scrollbar-thumb {
      background: #888;
      border-radius: 6px;
      min-height: 20px
    }

    #piano-keyboard {
      position: relative;
      display: flex;
      height: 130px;
      min-width: max-content;
    }

    .key {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 4px;
      touch-action: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .key.white {
      width: 59px;
      height: 124px;
      background: #fff;
      border-radius: 0 0 5px 5px;
      z-index: 1;
      touch-action: none;
      border: 1px solid #bbb;
      border-top: none;
      transition: background .07s;
    }

    .key.white.pressed,
    .key.white:active {
      background: #ffe0b2;
    }

    .key.black {
      width: 36px;
      height: 76px;
      touch-action: none;
      background: linear-gradient(180deg, #3a3a3a 0%, #111 100%);
      border-radius: 0 0 4px 4px;
      z-index: 2;
      border: 1px solid #000;
      border-top: none;
      transition: background .07s;
    }

    .key.black.pressed,
    .key.black:active {
      background: linear-gradient(180deg, #555 0%, #333 100%);
    }

    .key-label {
      font-family: 'Jua', sans-serif;
      font-size: 16px;
      pointer-events: none;
      text-align: center;
      line-height: 1.1;
    }

    .key.white .key-label {
      color: #1a237e;
    }

    .key.white.oct5 .key-label {
      color: #b71c1c;
    }

    /* ── 하단 3칸 ── */
    .bottom-row {
      display: flex;
      align-items: stretch;
      gap: 10px;
      width: 100%;
      max-width: 980px;
    }

    .fingering-card {
      background: #fff;
      border: 2px solid #ccc;
      border-radius: 12px;
      box-shadow: 0 3px 12px rgba(0, 0, 0, .12);
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 8px 8px;
      min-width: 120px;
    }

    .score-card {
      background: #fefae8;
      border: 2px solid #ccc;
      border-radius: 12px;
      box-shadow: 0 3px 12px rgba(0, 0, 0, .12);
      flex: 1.4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 8px 10px;
    }

    .fingering-title {
      font-family: 'Jua', sans-serif;
      font-size: 2.55rem;
      color: #333;
      text-align: center;
      margin-bottom: 6px;
    }

    .score-note-name {
      font-family: 'Jua', sans-serif;
      font-size: 4rem;
      color: #8b0000;
      margin-top: 4px;
      display: none;
    }

    .no-note {
      font-family: 'Jua', sans-serif;
      font-size: .75rem;
      color: #bbb;
      margin-top: 8px;
    }

    .fingering-img {
      width: auto;
      height: 624px;
      max-width: none;
      display: block;
      object-fit: contain;
    }

    .fingering-placeholder {
      color: #bbb;
      font-size: .7rem;
      margin-top: 20px;
    }

    @media(max-width:620px) {
      .bottom-row {
        flex-direction: column;
        align-items: center
      }

      .fingering-card,
      .score-card {
        width: 100%;
        max-width: 100%
      }
    }
  </style>
</head>

<body>
  <h1>🎵 소프라노 리코더 운지법</h1>

  <div class="piano-case">
    <div class="piano-btn-bar">
      <div class="btn-group">
        <button class="piano-btn btn-tone" id="btn-piano" onclick="setTone('piano')">🎹 피아노</button>
        <button class="piano-btn btn-tone active" id="btn-recorder" onclick="setTone('recorder')">🎵 리코더</button>
      </div>
      <div class="btn-group">
        <button class="piano-btn btn-size" id="btn-x1" onclick="setSize('x1')">x1</button>
        <button class="piano-btn btn-size active" id="btn-x2" onclick="setSize('x2')">x2</button>
        <button class="piano-btn btn-size" id="btn-x3" onclick="setSize('x3')">x3</button>
        <div class="vol-group">
          <span class="vol-label">🔊</span>
          <input class="vol-slider" type="range" min="0" max="1" step="0.01" value="0.6" id="vol-slider"
            oninput="setVolume(this.value)">
        </div>
      </div>
    </div>
    <div class="piano-key-area">
      <div id="piano-keyboard"></div>
    </div>
  </div>

  <div class="bottom-row">
    <div class="fingering-card">
      <div class="fingering-title">독일식</div>
      <div id="img-german"></div>
    </div>

    <div class="score-card">
      <div id="score-block-1">
        <svg id="svg-score" width="220" height="250" viewBox="0 0 220 250"></svg>
        <div class="score-note-name" id="score-name">—</div>
      </div>
      <div id="score-block-2" style="display:none;margin-top:12px;">
        <svg id="svg-score2" width="220" height="250" viewBox="0 0 220 250"></svg>
        <div class="score-note-name" id="score-name2"></div>
      </div>
    </div>

    <div class="fingering-card">
      <div class="fingering-title">바로크식</div>
      <div id="img-baroque"></div>
    </div>
  </div>

    const initAudio = async () => {
      if (actx.state === 'suspended') await actx.resume();
      // 워밍업: 극소음 사인파를 0.8초 재생해 오디오 파이프라인 완전 초기화
      const now = actx.currentTime;
      const o = actx.createOscillator();
      const g = actx.createGain();
      o.type = 'sine';
      o.frequency.value = 440;
      g.gain.setValueAtTime(0.00001, now);          // 사람이 들을 수 없는 극소음
      g.gain.linearRampToValueAtTime(0.00001, now + 0.8);
      o.connect(g).connect(actx.destination);
      o.start(now);
      o.stop(now + 0.8);
      ['touchstart', 'touchend', 'mousedown', 'pointerdown', 'keydown'].forEach(evt =>

      );

      currentSizePx = fp;
      document.querySelectorAll('.btn-size').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + sz).classList.add('active');
    }

    async function play(freq) {
      if (actx.state === 'suspended') await actx.resume();
      const now = actx.currentTime, g = actx.createGain();
      if (currentTone === 'piano') {
        // 피아노 음색
        const f = actx.createBiquadFilter();
        const o1 = actx.createOscillator(); o1.type = 'triangle'; o1.frequency.value = freq;
        const o2 = actx.createOscillator(); o2.type = 'sine'; o2.frequency.value = freq * 2;
        const g2 = actx.createGain(); g2.gain.value = 0.2;
        const oh = actx.createOscillator(); oh.type = 'sine'; oh.frequency.value = freq * 3;
        const gh = actx.createGain(); gh.gain.setValueAtTime(0.6, now); gh.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
        o1.connect(f); o2.connect(g2).connect(f); oh.connect(gh).connect(f);
        f.type = 'lowpass'; f.frequency.setValueAtTime(4000, now); f.frequency.exponentialRampToValueAtTime(800, now + 1);
        g.gain.setValueAtTime(0.0001, now); g.gain.linearRampToValueAtTime(0.4, now + 0.005); g.gain.exponentialRampToValueAtTime(0.01, now + 2);
        f.connect(g).connect(mGain);
        [o1, o2, oh].forEach(o => { o.start(now); try { o.stop(now + 2.25); } catch (e) { } });
      } else {
        // 리코더 음색: triangle 기반 + lowpass + breath noise + LFO 비브라토
        // 1. 주 오실레이터: triangle (배음 약간 포함)
        const o1 = actx.createOscillator(); o1.type = 'triangle'; o1.frequency.value = freq;
        // 2. 배음 오실레이터 (2배음, 3배음 약하게)
        const o2 = actx.createOscillator(); o2.type = 'sine'; o2.frequency.value = freq * 2;
        const g2 = actx.createGain(); g2.gain.value = 0.06;
        const o3 = actx.createOscillator(); o3.type = 'sine'; o3.frequency.value = freq * 3;
        const g3 = actx.createGain(); g3.gain.value = 0.02;
        // 3. LFO 비브라토 (5Hz, 깊이 ±2Hz)
        const lfo = actx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 5.2;
        const lfoGain = actx.createGain(); lfoGain.gain.value = freq * 0.004;
        lfo.connect(lfoGain); lfoGain.connect(o1.frequency);
        // 4. 브레스 노이즈 (시작 0.06초간)
        const bufLen = Math.floor(actx.sampleRate * 0.08);
        const buf = actx.createBuffer(1, bufLen, actx.sampleRate);
        const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
        const noise = actx.createBufferSource(); noise.buffer = buf;
        const nf = actx.createBiquadFilter(); nf.type = 'bandpass'; nf.frequency.value = freq * 1.5; nf.Q.value = 2;
        const ng = actx.createGain();
        ng.gain.setValueAtTime(0.12, now);
        ng.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
        noise.connect(nf).connect(ng).connect(mGain);
        // 5. lowpass 필터 (날카로운 고주파 제거)
        const lp = actx.createBiquadFilter(); lp.type = 'lowpass';
        lp.frequency.setValueAtTime(freq * 6, now);
        lp.frequency.exponentialRampToValueAtTime(freq * 3, now + 1.5);
        lp.Q.value = 0.8;
        // 6. ADSR: Attack 0.05s, Sustain 무한 (pointerup에서 정지)
        g.gain.setValueAtTime(0.0001, now);
        g.gain.linearRampToValueAtTime(0.35, now + 0.05);   // Attack
        g.gain.linearRampToValueAtTime(0.28, now + 0.15);   // Decay→Sustain
        // 연결
        o1.connect(lp); o2.connect(g2).connect(lp); o3.connect(g3).connect(lp);
        lp.connect(g).connect(mGain);
        [o1, o2, o3, lfo].forEach(o => o.start(now));
        noise.start(now);
        // 현재 재생 중인 노드 저장 (pointerup에서 정지)
        recorderNodes = { osc: [o1, o2, o3, lfo], gain: g, ctx: actx };
      }
    }

    // ── 건반 생성 ──
    const WHITE = ALL.filter(n => !n.acc && n.o >= 5);
    const BLACK = ALL.filter(n => n.acc && n.o >= 5);
    const wIdx = {}; WHITE.forEach((n, i) => wIdx[n.n] = i);
    const WW = 59;
    const blackAfter = {
      'C#5': 'C5', 'Eb5': 'D5', 'F#5': 'F5', 'Ab5': 'G5', 'Bb5': 'A5',
      'C#6': 'C6', 'Eb6': 'D6', 'F#6': 'F6', 'Ab6': 'G6', 'Bb6': 'A6',
      'C#7': 'C7',
    };

    (function buildKb() {
      const kb = document.getElementById('piano-keyboard');
      WHITE.forEach((n, i) => {
        const el = document.createElement('div');
        el.className = `key white${n.o === 5 ? ' oct5' : ''}`;
        el.dataset.note = n.n;
        const lbl = document.createElement('div');
        lbl.className = 'key-label';
        lbl.textContent = n.k;
        el.appendChild(lbl);
        el.addEventListener('pointerdown', async e => { e.preventDefault(); el.setPointerCapture(e.pointerId); await onNote(n); });
        el.addEventListener('pointerup', e => { el.releasePointerCapture(e.pointerId); stopRecorder(); });
        el.addEventListener('pointercancel', e => { el.releasePointerCapture(e.pointerId); stopRecorder(); });
        kb.appendChild(el);
      });
      kb.style.position = 'relative';
      BLACK.forEach(n => {
        const left = blackAfter[n.n]; if (!left) return;
        const li = wIdx[left]; if (li === undefined) return;
        const el = document.createElement('div');
        el.className = 'key black'; el.dataset.note = n.n;
        el.style.position = 'absolute';
        el.style.left = (li * WW + WW - 18) + 'px';
        el.style.top = '0';
        el.addEventListener('pointerdown', async e => { e.preventDefault(); el.setPointerCapture(e.pointerId); await onNote(n); });
        el.addEventListener('pointerup', e => { el.releasePointerCapture(e.pointerId); stopRecorder(); });
        el.addEventListener('pointercancel', e => { el.releasePointerCapture(e.pointerId); stopRecorder(); });
        kb.appendChild(el);
      });
      kb.style.width = (WHITE.length * WW) + 'px';
    })();

    // ── 건반 클릭 ──
    async function onNote(nd) {
      stopRecorder();
      await play(nd.f);
      showFingering('img-german', 'G', nd.n);
      showFingering('img-baroque', 'B', nd.n);
      // 악보는 한 옥타브 낮게 표시
      const scoreNd = ALL.find(x => x.acc === nd.acc && x.o === nd.o - 1 && Math.abs(x.f * 2 - nd.f) < 1.0) || nd;
      drawScore(scoreNd);
      document.querySelectorAll('.key.pressed').forEach(e => e.classList.remove('pressed'));
      const el = document.querySelector(`.key[data-note="${nd.n}"]`);
      if (el) { el.classList.add('pressed'); setTimeout(() => el.classList.remove('pressed'), 300); }
    }

    // ── 운지법 이미지 표시 ──
    function showFingering(divId, style, noteKey) {
      const div = document.getElementById(divId);
      const fkey = NOTE_ALIAS[noteKey] || noteKey;
      const src = FIMG[style + '_' + fkey];
      if (src) {
        div.innerHTML = `<img src="${src}" class="fingering-img" />`;
        div.querySelector('img').style.height = currentSizePx + 'px';
      } else {
        div.innerHTML = '<span class="fingering-placeholder">운지법 없음</span>';
      }
    }

    // ── 오선 하나 그리기 ──
    function drawOneScore(svgEl, nd) {
      svgEl.innerHTML = '';
      const W = 220, H = 220;
      const line1y = 163, lineGap = 14, halfGap = 7;
      function sy(s) { return line1y - s * halfGap; }

      se(svgEl, 'rect', { width: W, height: 250, fill: '#fefae8' });
      for (let i = 0; i < 5; i++) {
        const y = line1y - i * lineGap;
        se(svgEl, 'line', { x1: 8, x2: W - 8, y1: y, y2: y, stroke: '#8b4513', 'stroke-width': 1.8 });
      }
      se(svgEl, 'line', { x1: 8, x2: 8, y1: line1y - 4 * lineGap, y2: line1y, stroke: '#8b4513', 'stroke-width': 2 });
      se(svgEl, 'line', { x1: W - 8, x2: W - 8, y1: line1y - 4 * lineGap, y2: line1y, stroke: '#8b4513', 'stroke-width': 2.5 });
      se(svgEl, 'line', { x1: W - 13, x2: W - 13, y1: line1y - 4 * lineGap, y2: line1y, stroke: '#8b4513', 'stroke-width': 1.2 });

      const clef = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      clef.setAttribute('x', '8');
      clef.setAttribute('y', String(line1y + 2));
      clef.setAttribute('font-size', '98');
      clef.setAttribute('fill', '#8b1a1a');
      clef.setAttribute('font-family', 'serif');
      clef.textContent = '𝄞';
      svgEl.appendChild(clef);

      const step = nd.s, nx = 165, ny = sy(step), r = 7, col = '#8b1a1a';

      // 덧줄
      if (step <= -2) {
        for (let ls = -2; ls >= step; ls -= 2) {
          se(svgEl, 'line', { x1: nx - r - 5, x2: nx + r + 5, y1: sy(ls), y2: sy(ls), stroke: col, 'stroke-width': 1.8 });
        }
      }
      if (step >= 10) {
        for (let ls = 10; ls <= step; ls += 2) {
          se(svgEl, 'line', { x1: nx - r - 5, x2: nx + r + 5, y1: sy(ls), y2: sy(ls), stroke: col, 'stroke-width': 1.8 });
        }
      }

      // 임시표
      if (nd.acc) {
        const accEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        accEl.setAttribute('x', String(nx - 32));
        accEl.setAttribute('y', String(ny + 7));
        accEl.setAttribute('font-size', '24');
        accEl.setAttribute('fill', col);
        accEl.setAttribute('font-family', 'serif');
        accEl.textContent = nd.acc === 'sharp' ? '♯' : '♭';
        svgEl.appendChild(accEl);
      }

      // 음표 머리
      se(svgEl, 'ellipse', { cx: nx, cy: ny, rx: r + 1, ry: r - 1.5, fill: col, transform: `rotate(-15,${nx},${ny})` });

      // 기둥
      const stemUp = step < 6;
      if (stemUp) {
        se(svgEl, 'line', { x1: nx + r, x2: nx + r, y1: ny, y2: ny - 38, stroke: col, 'stroke-width': 1.8 });
      } else {
        se(svgEl, 'line', { x1: nx - r, x2: nx - r, y1: ny, y2: ny + 38, stroke: col, 'stroke-width': 1.8 });
      }

      // 계이름: 음표 x위치 아래에 표시
      const nameEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      nameEl.setAttribute('x', String(nx));
      nameEl.setAttribute('y', '240');
      nameEl.setAttribute('text-anchor', 'middle');
      nameEl.setAttribute('font-size', '36');
      nameEl.setAttribute('font-family', 'Jua,sans-serif');
      nameEl.setAttribute('fill', '#8b0000');
      nameEl.textContent = nd.k;
      svgEl.appendChild(nameEl);
    }

    // ── 악보 표시 (임시표 있으면 두 개) ──
    function drawScore(nd) {
      const block2 = document.getElementById('score-block-2');
      if (nd.acc) {
        let ndA = nd;
        let ndB = ALL.find(x => x.acc && x.acc !== nd.acc && Math.abs(x.f - nd.f) < 0.5);
        if (ndA.acc === 'flat') { let tmp = ndA; ndA = ndB || ndA; ndB = tmp; }
        drawOneScore(document.getElementById('svg-score'), ndA);
        document.getElementById('score-name').textContent = ndA ? ndA.k : nd.k;
        if (ndB) {
          drawOneScore(document.getElementById('svg-score2'), ndB);
          document.getElementById('score-name2').textContent = ndB.k;
          block2.style.display = 'block';
        } else {
          block2.style.display = 'none';
        }
      } else {
        drawOneScore(document.getElementById('svg-score'), nd);
        document.getElementById('score-name').textContent = nd.k;
        block2.style.display = 'none';
      }
    }

    // ── 초기 빈 오선 ──
    (function initScore() {
      const svgEl = document.getElementById('svg-score');
      svgEl.innerHTML = '';
      const W = 220, H = 220, line1y = 163, lineGap = 14;
      se(svgEl, 'rect', { width: W, height: 250, fill: '#fefae8' });
      for (let i = 0; i < 5; i++) {
        const y = line1y - i * lineGap;
        se(svgEl, 'line', { x1: 8, x2: W - 8, y1: y, y2: y, stroke: '#8b4513', 'stroke-width': 1.8 });
      }
      se(svgEl, 'line', { x1: 8, x2: 8, y1: line1y - 4 * lineGap, y2: line1y, stroke: '#8b4513', 'stroke-width': 2 });
      se(svgEl, 'line', { x1: W - 8, x2: W - 8, y1: line1y - 4 * lineGap, y2: line1y, stroke: '#8b4513', 'stroke-width': 2.5 });
      se(svgEl, 'line', { x1: W - 13, x2: W - 13, y1: line1y - 4 * lineGap, y2: line1y, stroke: '#8b4513', 'stroke-width': 1.2 });
      const clef = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      clef.setAttribute('x', '8');
      clef.setAttribute('y', String(line1y + 2));
      clef.setAttribute('font-size', '98');
      clef.setAttribute('fill', '#8b1a1a');
      clef.setAttribute('font-family', 'serif');
      clef.textContent = '𝄞';
      svgEl.appendChild(clef);
      // 힌트 텍스트: 오선지 위 충분히 위에
      const hint = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      hint.setAttribute('x', '110');
      hint.setAttribute('y', '36');
      hint.setAttribute('text-anchor', 'middle');
      hint.setAttribute('font-size', '31');
      hint.setAttribute('fill', '#222');
      hint.setAttribute('font-family', 'Jua,sans-serif');
      hint.textContent = '건반을 누르세요.';
      svgEl.appendChild(hint);
    })();
  </script>
